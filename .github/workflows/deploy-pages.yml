name: Deploy Hekswerk

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Hekswerk
        uses: actions/checkout@v6

      - name: Check out WorldWeaver documentation
        uses: actions/checkout@v6
        with:
          repository: libardo667/worldweaver
          path: worldweaver-source

      - name: Record WorldWeaver documentation version
        id: worldweaver
        run: echo "commit=$(git -C worldweaver-source rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          WORLDWEAVER_DOCS_DIR: ./worldweaver-source/docs
          WORLDWEAVER_COMMIT: ${{ steps.worldweaver.outputs.commit }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
